<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuietForge | Login</title>
  <link rel="icon" type="image/svg+xml" href="/public/favicon.svg">
  <link rel="stylesheet" href="/public/style.css">
  <!-- tsParticles -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles-preset-stars@2/tsparticles.preset.stars.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #06090f !important;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    #tsparticles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .login-container {
      background: rgba(13, 17, 23, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 320px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 40px rgba(88, 166, 255, 0.1);
      text-align: center;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    .login-logo {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }
    .login-input {
      width: 100%;
      padding: 12px;
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 20px;
      box-sizing: border-box;
      outline: none;
    }
    .login-input:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.3);
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #238636;
      color: #fff;
      border: 1px solid rgba(240,246,252,0.1);
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover {
      background: #2ea043;
    }
    .login-error {
      color: #f85149;
      font-size: 13px;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>
<body>

  <div id="tsparticles"></div>

  <div class="login-container" style="position: relative; z-index: 1;">
    <div class="login-logo">
      <img src="/public/favicon.svg" alt="QuietForge Logo" width="48" height="48" style="display:block; margin: 0 auto 10px auto;">
      QuietForge
    </div>
    <form id="loginForm">
      <input type="password" id="pwdInput" class="login-input" placeholder="Password" required autofocus>
      <button type="submit" class="login-btn">Sign In</button>
      <div id="errorMsg" class="login-error">Invalid password</div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pwd = document.getElementById('pwdInput').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd })
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json();
          errorMsg.textContent = data.error || 'Login failed';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Network error';
        errorMsg.style.display = 'block';
      }
    });

    tsParticles.load("tsparticles", {
      fpsLimit: 60,
      interactivity: {
        events: {
          onHover: {
            enable: true,
            mode: "grab"
          },
          onClick: {
            enable: true,
            mode: "push"
          }
        },
        modes: {
          grab: { distance: 140, links: { opacity: 0.8 } },
          push: { quantity: 4 }
        }
      },
      particles: {
        color: { value: "#58a6ff" },
        links: {
          color: "#58a6ff",
          distance: 150,
          enable: true,
          opacity: 0.3,
          width: 1
        },
        move: {
          enable: true,
          speed: 1,
          direction: "none",
          random: false,
          straight: false,
          outModes: "out"
        },
        number: { density: { enable: true, area: 800 }, value: 60 },
        opacity: { value: 0.5 },
        shape: { type: "circle" },
        size: { value: { min: 1, max: 3 } }
      },
      detectRetina: true
    });
  </script>
</body>
</html>
